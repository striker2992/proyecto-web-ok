{% load static %}

<!DOCTYPE html>

<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Nuevo Producto</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>
<div class="admin-container">


<h1 class="admin-title">
    📦 Nuevo Producto
</h1>

<form method="POST" enctype="multipart/form-data" class="form-admin">


    {% csrf_token %}

    <input
        type="text"
        name="nombre"
        placeholder="Nombre del producto"
        required
    >

    <input
        type="number"
        name="precio"
        placeholder="Precio"
        required
    >

    <input
    type="file"
    name="imagen"
>

    <input
        type="number"
        name="stock"
        placeholder="Stock"
        required
    >

    <textarea
        name="descripcion"
        placeholder="Descripción del producto"
        rows="5"
    ></textarea>

    <button type="submit">
        💾 Guardar Producto
    </button>

</form>

<br>

<a href="{% url 'admin_productos' %}" class="admin-btn">
    ⬅️ Volver
</a>


</div>

</body>
</html>
